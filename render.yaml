services:
  - type: web
    name: kgotso-ml-harare
    runtime: python
    rootDir: ml-service
    branch: kgotso-v2
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
    healthCheckPath: /
